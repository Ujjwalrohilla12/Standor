name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

  backend:
    name: Backend — typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run typecheck
      - name: Start MongoDB service wait
        run: |
          echo "Waiting briefly for test services to start"
          sleep 6
      - run: npm test
        env:
          DATABASE_URL: mongodb://localhost:27017/standor_test
          JWT_SECRET: ci_test_secret_key_at_least_32_chars_long
          NODE_ENV: test
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
